<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="AI-900 Microsoft Azure AI Fundamentals study app" />
		<title>AI-900 Study Helper</title>
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
	</head>
	<body>
		<!-- Prevent FOUC: apply theme + accent before React hydrates -->
		<script>
			(function () {
				var t = localStorage.getItem('theme_pref');
				if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
				document.documentElement.setAttribute('data-theme', t);
				if (t === 'dark') document.documentElement.classList.add('dark');
				var a = localStorage.getItem('accent_pref');
				if (a) document.documentElement.setAttribute('data-accent', a);
			})();
		</script>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>

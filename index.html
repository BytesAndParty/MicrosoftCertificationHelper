<!doctype html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" href="/favicon.ico" />
		<title>AI-900 Study Companion</title>
		<script>
			(() => {
				try {
					const themeKey = 'ai900_theme_pref';
					const stored = localStorage.getItem(themeKey);
					const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const resolved = stored === 'dark' || stored === 'light' ? stored : prefersDark ? 'dark' : 'light';
					document.documentElement.dataset.theme = resolved;
					document.documentElement.classList.toggle('dark', resolved === 'dark');
					const lang = localStorage.getItem('ai900_lang_pref');
					if (lang === 'de' || lang === 'en') document.documentElement.lang = lang;
				} catch {}
			})();
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
